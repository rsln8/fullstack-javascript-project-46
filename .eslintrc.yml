env:
  node: true
  es2021: true
  jest: true

extends:
  - eslint:recommended
  - plugin:jest/recommended

parserOptions:
  ecmaVersion: 2022
  sourceType: module

rules:
  indent:
    - error
    - 2
  quotes:
    - error
    - single
  semi:
    - error
    - always
  comma-dangle:
    - error
    - always-multiline
  no-console: off