name: Debug tests

on:
  push:
    branches: [main]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test
      - run: |
          echo "=== Testing CLI stylish ==="
          node bin/gendiff.js __fixtures__/file1.json __fixtures__/file2.json
          echo "=== Testing YAML ==="
          node bin/gendiff.js __fixtures__/file1.yml __fixtures__/file2.yml
          echo "=== Testing nested stylish ==="
          node bin/gendiff.js __fixtures__/nested_file1.json __fixtures__/nested_file2.json
          echo "=== Testing plain format ==="
          node bin/gendiff.js -f plain __fixtures__/nested_file1.json __fixtures__/nested_file2.json
          echo "=== Testing json format ==="
          node bin/gendiff.js -f json __fixtures__/nested_file1.json __fixtures__/nested_file2.json
